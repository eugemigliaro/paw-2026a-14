<!DOCTYPE html>
<html lang="en">
	<body style="font-family: Arial, sans-serif; color: #0f172a; line-height: 1.6;">
		<div style="max-width: 640px; margin: 0 auto; padding: 24px;">
			<p style="margin: 0 0 12px; color: #475569;">Match Point</p>
			<h1 style="margin: 0 0 16px; font-size: 28px;" th:text="${title}">Confirm your reservation</h1>
			<p style="margin: 0 0 16px;" th:text="${summary}">Use this confirmation to finish your action.</p>
			<p style="margin: 0 0 16px;">
				This link was requested for <strong th:text="${recipientEmail}">player@example.com</strong>.
			</p>

			<table
				th:if="${details != null and !details.isEmpty()}"
				style="width: 100%; border-collapse: collapse; margin: 0 0 24px;">
				<tr th:each="detail : ${details}">
					<td
						style="padding: 8px 0; color: #64748b; border-bottom: 1px solid #e2e8f0;"
						th:text="${detail.label}">
						Label
					</td>
					<td
						style="padding: 8px 0; text-align: right; border-bottom: 1px solid #e2e8f0;"
						th:text="${detail.value}">
						Value
					</td>
				</tr>
			</table>

			<p style="margin: 0 0 24px;">
				<a
					th:href="${confirmationUrl}"
					style="
						display: inline-block;
						background: #0f766e;
						color: #ffffff;
						padding: 12px 20px;
						border-radius: 999px;
						text-decoration: none;
						font-weight: 600;
					">
					Review and confirm
				</a>
			</p>

			<p style="margin: 0 0 12px; color: #64748b;">
				This link expires at <span th:text="${expiresAtLabel}">Apr 5, 2026, 9:00 PM</span>.
			</p>
			<p style="margin: 0; color: #64748b;">
				If you did not request this action, you can ignore this email.
			</p>
		</div>
	</body>
</html>
