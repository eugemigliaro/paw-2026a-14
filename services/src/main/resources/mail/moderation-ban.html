<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${lang}">
	<body style="margin:0; padding:24px; background-color:#f4efe5; font-family:'Plus Jakarta Sans', Arial, sans-serif; color:#1c2e2b;">
		<table role="presentation" width="100%" cellspacing="0" cellpadding="0">
			<tr>
				<td align="center">
					<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:640px; background:#ffffff; border-radius:24px; border:1px solid #ebece8; padding:32px;">
						<tr>
							<td style="font-size:28px; font-weight:800; letter-spacing:-0.04em; color:#00645a;">Match Point</td>
						</tr>
						<tr>
							<td style="padding-top:20px; font-size:14px; font-weight:700; letter-spacing:0.08em; color:#5d6c68; text-transform:uppercase;" th:text="${mailEyebrow}">Moderation notice</td>
						</tr>
						<tr>
							<td style="padding-top:8px; font-size:30px; font-weight:800; line-height:1.08;" th:text="${title}">Your account is temporarily banned</td>
						</tr>
						<tr>
							<td style="padding-top:16px; font-size:18px; line-height:1.7;" th:text="${summary}">Review the details below and sign in to appeal if needed.</td>
						</tr>
						<tr>
							<td style="padding-top:24px;">
								<div style="padding:20px; border-radius:18px; background:#f7f6f3;">
									<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;">
										<tr>
											<td style="padding:10px 0; border-bottom:1px solid #e2e7e2; font-size:14px; color:#5d6c68; text-transform:uppercase; letter-spacing:0.04em;" th:text="${usernameLabel}">User</td>
											<td style="padding:10px 0; border-bottom:1px solid #e2e7e2; text-align:right; font-size:16px; font-weight:700; color:#1c2e2b;" th:text="${username}">player123</td>
										</tr>
										<tr>
											<td style="padding:10px 0; border-bottom:1px solid #e2e7e2; font-size:14px; color:#5d6c68; text-transform:uppercase; letter-spacing:0.04em;" th:text="${bannedUntilLabel}">Banned until</td>
											<td style="padding:10px 0; border-bottom:1px solid #e2e7e2; text-align:right; font-size:16px; font-weight:700; color:#1c2e2b;" th:text="${bannedUntil}">Apr 20, 2026, 12:00 PM</td>
										</tr>
										<tr>
											<td style="padding:10px 0; border-bottom:1px solid #e2e7e2; font-size:14px; color:#5d6c68; text-transform:uppercase; letter-spacing:0.04em;" th:text="${reasonLabel}">Reason</td>
											<td style="padding:10px 0; border-bottom:1px solid #e2e7e2; text-align:right; font-size:16px; font-weight:700; color:#1c2e2b;" th:text="${reason}">Repeated abuse</td>
										</tr>
									</table>
								</div>
							</td>
						</tr>
						<tr>
							<td style="padding-top:28px;">
								<a
									th:href="${loginUrl}"
									style="display:inline-block; background:#00645a; color:#ffffff; text-decoration:none; font-weight:700; padding:16px 24px; border-radius:999px;"
									th:text="${loginLabel}">Sign in</a>
							</td>
						</tr>
					</table>
				</td>
			</tr>
		</table>
	</body>
</html>
